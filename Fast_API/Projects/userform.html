<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Registration Form</title>
    <style>
        /* Base Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Form Container */
        .form-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 650px;
            padding: 40px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            color: #333333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #777777;
            font-size: 14px;
        }

        /* Grid Layout for Inputs */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Full width for specific rows (Address etc.) */
        .full-width {
            grid-column: span 2;
        }

        /* Input Groups */
        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            color: #4a5568;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-group input, .input-group textarea {
            padding: 12px 16px;
            border: 1.5px solid #cbd5e0;
            border-radius: 6px;
            font-size: 15px;
            color: #2d3748;
            transition: all 0.3s ease;
            outline: none;
        }

        /* Input Focus Effects */
        .input-group input:focus, .input-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        textarea {
            resize: none;
            height: 80px;
        }

        /* Button Styling */
        .btn-container {
            grid-column: span 2;
            margin-top: 15px;
        }

        .submit-btn {
            width: 100%;
            background-color: #667eea;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #5a67d8;
        }

        /* Responsive design for Mobile Screen */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width, .btn-container {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>Create Account</h2>
            <p>Please fill out this form to register your profile.</p>
        </div>

        <form class="form-grid" action="http://127.0.0.1:8000/User_Registration" method="POST">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Muhammad Ali" required>
            </div>

            <div class="input-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="21" min="1" required>
            </div>

            <div class="input-group">
                <label for="contact">Contact Number</label>
                <input type="tel" id="contact" name="contact"  placeholder="03001234567" required>
            </div>

            <div class="input-group">
                <label for="cgpa">CGPA</label>
                <input type="number" id="cgpa" name="cgpa"  placeholder="3.25" step="0.01" min="0" max="4" required>
            </div>

            <div class="input-group full-width">
                <label for="address">Address</label>
                <textarea id="address" name="address" placeholder="Street 5, Sector I-9, Islamabad" required></textarea>
            </div>

            <div class="input-group full-width">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
            </div>

            <div class="input-group full-width">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="btn-container">
                <button type="submit" class="submit-btn">Register Now</button>
            </div>
        </form>
    </div>

</body>
</html>
